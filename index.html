<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="Content-Language" content="en-us">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rampyai</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <div id="logoWrap">
                <img id="logo" src="logo.png" alt="rampyai logo">
            </div>
            <div id="titles">
                <div id="appTitle">rampyai</div>
                <div id="appSub">Classic chat for old iPhone browsers</div>
            </div>
        </div>

        <div id="settings">
            <div class="field-row">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" value="">
            </div>
            <div class="field-row">
                <label for="baseURL">Base URL</label>
                <input type="text" id="baseURL" value="https://api.openai.com">
            </div>
            <div class="field-row">
                <label for="model">Model</label>
                <input type="text" id="model" value="gpt-3.5-turbo">
            </div>
            <div class="buttons">
                <button onclick="saveSettings()">Save</button>
                <button onclick="clearChat()">Clear</button>
            </div>
        </div>

        <div id="chat">
            <div id="messages"></div>
            <div id="composer">
                <textarea id="prompt" rows="3" cols="20" placeholder="Message rampyai..."></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="statusBar">
            <span id="statusText">Ready</span>
        </div>
    </div>

    <script type="text/javascript" src="app.js"></script>
</body>
</html>
