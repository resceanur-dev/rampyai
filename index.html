<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="Content-Language" content="en-us">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rampyai</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div id="statusBarChrome">
        <span>9:41 AM</span>
        <span class="status-icons">rampyai 100%</span>
    </div>
    <div id="app">
        <div id="navBar">
            <button id="navBack" type="button">Settings</button>
            <div id="navTitle">rampyai</div>
            <div id="navHint">iOS 6 mode</div>
        </div>

        <div id="header">
            <div id="logoWrap">
                <img id="logo" src="logo.png" alt="rampyai logo">
            </div>
            <div id="titles">
                <div id="appTitle">rampyai</div>
                <div id="appSub">Classic chat for old iPhone browsers</div>
            </div>
        </div>

        <div id="settings">
            <div class="section-title">OpenRouter Server</div>
            <div class="group">
                <div class="group-row">
                    <label for="agentURL">Server URL</label>
                    <input type="text" id="agentURL" value="https://openrouter.ai/api/v1">
                </div>
                <div class="group-row">
                    <label for="openrouterKey">OpenRouter API Key</label>
                    <input type="password" id="openrouterKey" value="" placeholder="sk-or-v1-...">
                </div>
                <div class="group-row last">
                    <label for="model">Model</label>
                    <input type="text" id="model" value="meta-llama/llama-3.1-8b-instruct:free">
                </div>
            </div>

            <div class="section-title small">Visuals</div>
            <div class="group">
                <div class="group-row switch-row">
                    <span>Classic iOS skin</span>
                    <label class="switch">
                        <input type="checkbox" id="classicSkin" checked onchange="saveThemePrefs()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="group-row switch-row">
                    <span>Glossy buttons</span>
                    <label class="switch">
                        <input type="checkbox" id="glossyButtons" checked onchange="saveThemePrefs()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="group-row switch-row last">
                    <span>Settings texture</span>
                    <label class="switch">
                        <input type="checkbox" id="settingsTexture" checked onchange="saveThemePrefs()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="buttons">
                <button onclick="saveSettings()">Save</button>
                <button onclick="clearChat()">Clear</button>
            </div>
            <div class="notice">This copy is set up for OpenRouter.</div>
            <div class="notice">The key stays in the browser and is sent only to your local server proxy.</div>
        </div>

        <div id="chat">
            <div id="messages"></div>
            <div id="composer">
                <textarea id="prompt" rows="3" cols="20" placeholder="Message rampyai..."></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="statusBar">
            <span id="statusText">Ready</span>
        </div>
    </div>

    <script type="text/javascript" src="app.js"></script>
</body>
</html>
